<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG INN - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0b1f1a; /* Verde oscuro Fibra Inn */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }
        
        /* ESTILOS DEL LOGIN */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background-color: #15332b;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 3px solid #c4d600; /* Lima Fibra Inn */
        }
        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-logo img {
            width: 100px;
            border-radius: 8px;
        }
        .login-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-control {
            background-color: #0b1f1a;
            border: 1px solid #2d5a4c;
            color: white;
        }
        .form-control:focus {
            background-color: #0b1f1a;
            color: white;
            border-color: #c4d600;
            box-shadow: 0 0 0 0.25rem rgba(196, 214, 0, 0.25);
        }
        .btn-fibra {
            background-color: #c4d600;
            color: #0b1f1a;
            font-weight: bold;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .btn-fibra:hover {
            background-color: #aaba00;
            color: #0b1f1a;
        }
        .input-icon {
            color: #c4d600;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }

        /* ESTILOS DEL DASHBOARD */
        #dashboard { display: none; padding-top: 30px; padding-bottom: 50px;}
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #2d5a4c;
            padding-bottom: 15px;
        }
        .card-custom {
            background-color: #15332b;
            border-radius: 8px;
            border-top: 3px solid #c4d600;
            padding: 25px;
            margin-bottom: 20px;
        }
        .status-select {
            background-color: #0b1f1a;
            border: 1px solid #2d5a4c;
            color: white;
            font-weight: bold;
        }
        .status-pendiente { color: #ff6b6b !important; }
        .status-entregado { color: #51cf66 !important; }
        
        #loader { display: none; text-align: center; margin-top: 50px; }
        .spinner-fibra { color: #c4d600; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://media.licdn.com/dms/image/v2/D560BAQHevH5LsJpmXQ/company-logo_200_200/B56Zi.DanDG4AI-/0/1755535223547/fibrainn_logo?e=2147483647&v=beta&t=IYGkfmXcHxEqXIvZ59Fyp20tYrYLykd70Ot_0YBIN1k" alt="Fibra Inn Logo">
            </div>
            <div class="login-title">Acceso Plataforma ESG</div>
            
            <div class="mb-3">
                <label class="input-icon"><i class="fas fa-user"></i> Usuario</label>
                <input type="text" id="user" class="form-control" placeholder="Ej: ESG">
            </div>
            <div class="mb-3">
                <label class="input-icon"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="pass" class="form-control" placeholder="****">
            </div>
            <button class="btn btn-fibra" onclick="iniciarSesion()">INGRESAR</button>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border spinner-fibra" role="status" style="width: 4rem; height: 4rem;"></div>
        <h4 class="mt-3">Conectando con Servidor ESG...</h4>
    </div>

    <div id="dashboard" class="container">
        <div class="dash-header">
            <div class="d-flex align-items-center">
                <img src="https://media.licdn.com/dms/image/v2/D560BAQHevH5LsJpmXQ/company-logo_200_200/B56Zi.DanDG4AI-/0/1755535223547/fibrainn_logo?e=2147483647&v=beta&t=IYGkfmXcHxEqXIvZ59Fyp20tYrYLykd70Ot_0YBIN1k" width="50" style="border-radius: 5px; margin-right: 15px;">
                <h2 class="mb-0">ESG INN <span style="color: #c4d600;">| Control de Estatus</span></h2>
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>

        <div class="card-custom">
            <label class="form-label fw-bold" style="color: #c4d600;"><i class="fas fa-building"></i> 1. Selecciona el Hotel (INCODE):</label>
            <select id="selectIncode" class="form-select status-select form-select-lg" onchange="mostrarRubros()">
                <option value="" selected disabled>Buscar hotel...</option>
                </select>
        </div>

        <div id="panelRubros" class="card-custom" style="display: none;">
            <h4 id="nombreHotelLabel" style="color: #c4d600; margin-bottom: 25px;"></h4>
            <div class="row" id="contenedorDropdowns">
                </div>
            <hr style="border-color: #2d5a4c; margin: 30px 0;">
            <div class="text-end">
                <button class="btn btn-fibra px-5" style="width: auto;" onclick="guardarEnGoogle()">
                    <i class="fas fa-save"></i> Guardar Cambios en Base de Datos
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // AQUÍ ESTÁ TU API YA CONECTADA:
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbwu4BMuNm42AZvlw6mg3RtNOXWaFlDr8abO_-IXl7PBMV4eYZTRo8EI22hac7wKyp2tEw/exec"; 
        
        let datosGlobales = [];
        let encabezadosGlobales = [];

        // 1. SISTEMA DE LOGIN
        function iniciarSesion() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // Credenciales que me pediste
            if(u === "ESG" && p === "2250") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('loader').style.display = 'block';
                cargarDatosDesdeAPI();
            } else {
                Swal.fire({ icon: 'error', title: 'Acceso Denegado', text: 'Usuario o contraseña incorrectos', background: '#15332b', color: '#fff' });
            }
        }

        // 2. CONECTAR CON GOOGLE SHEETS (API REST GET)
        function cargarDatosDesdeAPI() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    datosGlobales = data.hoteles;
                    encabezadosGlobales = data.encabezados;
                    
                    const select = document.getElementById('selectIncode');
                    datosGlobales.forEach(hotel => {
                        let option = document.createElement('option');
                        option.value = hotel.incode;
                        option.text = hotel.incode + " - " + hotel.nombre;
                        select.appendChild(option);
                    });

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                })
                .catch(error => {
                    Swal.fire({ icon: 'error', title: 'Error de Conexión', text: 'No se pudo conectar con la base de datos de Google. Revisa los permisos de la API.', background: '#15332b', color: '#fff' });
                });
        }

        // 3. MOSTRAR LOS 12 ESTATUS DEL HOTEL SELECCIONADO
        function mostrarRubros() {
            const incode = document.getElementById('selectIncode').value;
            if(!incode) return;

            const hotel = datosGlobales.find(h => h.incode === incode);
            document.getElementById('nombreHotelLabel').innerText = "Editando: " + hotel.nombre;
            
            const contenedor = document.getElementById('contenedorDropdowns');
            contenedor.innerHTML = "";

            encabezadosGlobales.forEach((encabezado, i) => {
                let estatus = hotel.estatus[i];
                let claseColor = estatus === 'Pendiente' ? 'status-pendiente' : 'status-entregado';
                let tituloLimpio = encabezado.replace('Estatus ', '').replace(' (ESG)', '').replace(' (Drive)', '');

                contenedor.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <label class="form-label small text-uppercase" style="color:#a8b8c8;">${tituloLimpio}</label>
                        <select class="form-select status-select ${claseColor}" id="rubro_${i}" onchange="cambiarColor(this)">
                            <option value="Pendiente" ${estatus === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option value="Entregado" ${estatus === 'Entregado' ? 'selected' : ''}>Entregado</option>
                        </select>
                    </div>
                `;
            });

            document.getElementById('panelRubros').style.display = 'block';
        }

        // 4. CAMBIAR COLOR AL SELECCIONAR
        function cambiarColor(selectElement) {
            selectElement.className = "form-select status-select " + (selectElement.value === 'Pendiente' ? 'status-pendiente' : 'status-entregado');
        }

        // 5. ENVIAR DATOS A GOOGLE SHEETS (API REST POST)
        function guardarEnGoogle() {
            const incode = document.getElementById('selectIncode').value;
            let nuevosEstatus = [];
            
            for(let i=0; i<12; i++) {
                nuevosEstatus.push(document.getElementById('rubro_' + i).value);
            }

            Swal.fire({
                title: 'Sincronizando...',
                text: 'Guardando datos en la matriz principal de Google Sheets...',
                background: '#15332b', color: '#fff',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            // Enviamos el POST a Google
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    incode: incode,
                    estatus: nuevosEstatus
                })
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    Swal.fire({ icon: 'success', title: '¡Guardado!', text: 'El estatus de ' + incode + ' fue actualizado con éxito.', background: '#15332b', color: '#fff' })
                    .then(() => {
                        // Recargar todo para traer datos frescos
                        document.getElementById('dashboard').style.display = 'none';
                        document.getElementById('panelRubros').style.display = 'none';
                        document.getElementById('loader').style.display = 'block';
                        document.getElementById('selectIncode').innerHTML = '<option value="" selected disabled>Buscar hotel...</option>';
                        cargarDatosDesdeAPI();
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: result.message, background: '#15332b', color: '#fff' });
                }
            })
            .catch(error => {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Falló la conexión al guardar. Verifica que tu API permita peticiones POST.', background: '#15332b', color: '#fff' });
            });
        }
    </script>
</body>
</html>
