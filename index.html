<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASG INN - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #0b1f1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; min-height: 100vh; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background-color: #15332b; border-radius: 8px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 3px solid #c4d600; }
        .login-logo { text-align: center; margin-bottom: 20px; }
        .login-logo img { width: 100px; border-radius: 8px; }
        .login-title { text-align: center; font-size: 1.2rem; margin-bottom: 30px; font-weight: 600; }
        .form-control { background-color: #0b1f1a; border: 1px solid #2d5a4c; color: white; }
        .form-control:focus { background-color: #0b1f1a; color: white; border-color: #c4d600; box-shadow: 0 0 0 0.25rem rgba(196, 214, 0, 0.25); }
        .btn-fibra { background-color: #c4d600; color: #0b1f1a; font-weight: bold; border: none; width: 100%; padding: 10px; border-radius: 4px; margin-top: 20px; }
        .btn-fibra:hover { background-color: #aaba00; color: #0b1f1a; }
        .input-icon { color: #c4d600; font-size: 0.9rem; margin-bottom: 5px; display: block; }
        #dashboard { display: none; padding-top: 30px; padding-bottom: 50px;}
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #2d5a4c; padding-bottom: 15px; }
        .card-custom { background-color: #15332b; border-radius: 8px; border-top: 3px solid #c4d600; padding: 25px; margin-bottom: 20px; }
        .status-select { background-color: #0b1f1a; border: 1px solid #2d5a4c; color: white; font-weight: bold; }
        .status-pendiente { color: #ff6b6b !important; }
        .status-entregado { color: #51cf66 !important; }
        .status-no-aplica { color: #a8b8c8 !important; }
        #loader { display: none; text-align: center; margin-top: 50px; }
        .spinner-fibra { color: #c4d600; }
        .file-upload-wrapper { border: 2px dashed #2d5a4c; border-radius: 8px; padding: 20px; text-align: center; background-color: #0b1f1a; margin-bottom: 15px; }
        input[type="file"]::file-selector-button { background-color: #2d5a4c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://media.licdn.com/dms/image/v2/D560BAQHevH5LsJpmXQ/company-logo_200_200/B56Zi.DanDG4AI-/0/1755535223547/fibrainn_logo?e=2147483647&v=beta&t=IYGkfmXcHxEqXIvZ59Fyp20tYrYLykd70Ot_0YBIN1k" alt="Fibra Inn Logo">
            </div>
            <div class="login-title">Acceso Plataforma ASG</div>
            <div class="mb-3">
                <label class="input-icon"><i class="fas fa-user"></i> Usuario</label>
                <input type="text" id="user" class="form-control" placeholder="Ej: ESG">
            </div>
            <div class="mb-3">
                <label class="input-icon"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="pass" class="form-control" placeholder="****">
            </div>
            <button class="btn btn-fibra" onclick="iniciarSesion()">INGRESAR</button>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border spinner-fibra" role="status" style="width: 4rem; height: 4rem;"></div>
        <h4 class="mt-3">Conectando con Servidor ASG...</h4>
    </div>

    <div id="dashboard" class="container">
        <div class="dash-header">
            <div class="d-flex align-items-center">
                <img src="https://media.licdn.com/dms/image/v2/D560BAQHevH5LsJpmXQ/company-logo_200_200/B56Zi.DanDG4AI-/0/1755535223547/fibrainn_logo?e=2147483647&v=beta&t=IYGkfmXcHxEqXIvZ59Fyp20tYrYLykd70Ot_0YBIN1k" width="50" style="border-radius: 5px; margin-right: 15px;">
                <h2 class="mb-0">ASG INN <span style="color: #c4d600;">| Panel de Control</span></h2>
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>

        <div class="card-custom">
            <h5 style="color: #c4d600; margin-bottom: 20px;"><i class="fas fa-file-excel"></i> Carga Masiva Inteligente (Sobrescritura Total)</h5>
            <div class="file-upload-wrapper">
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <button class="btn btn-fibra mt-0" style="width: auto; padding: 10px 30px;" onclick="procesarExcel()">
                <i class="fas fa-sync-alt"></i> Extraer y Sobrescribir Datos
            </button>
            <p class="small text-muted mt-3 mb-0"><i class="fas fa-info-circle"></i> El sistema leerá el Excel y forzará la actualización de todos los datos, limpiando errores previos.</p>
        </div>

        <div class="card-custom">
            <label class="form-label fw-bold" style="color: #c4d600;"><i class="fas fa-building"></i> O Edita un Hotel Individual (INCODE):</label>
            <select id="selectIncode" class="form-select status-select form-select-lg" onchange="mostrarRubros()">
                <option value="" selected disabled>Buscar hotel...</option>
            </select>
        </div>

        <div id="panelRubros" class="card-custom" style="display: none;">
            <h4 id="nombreHotelLabel" style="color: #c4d600; margin-bottom: 25px;"></h4>
            <div class="row" id="contenedorDropdowns"></div>
            <hr style="border-color: #2d5a4c; margin: 30px 0;">
            <div class="text-end">
                <button class="btn btn-fibra px-5" style="width: auto;" onclick="guardarEnGoogle()">
                    <i class="fas fa-save"></i> Guardar Cambios Individuales
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwu4BMuNm42AZvlw6mg3RtNOXWaFlDr8abO_-IXl7PBMV4eYZTRo8EI22hac7wKyp2tEw/exec"; 
        let datosGlobales = [];
        let encabezadosGlobales = [];

        function iniciarSesion() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u === "ESG" && p === "2250") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('loader').style.display = 'block';
                cargarDatosDesdeAPI();
            } else {
                Swal.fire({ icon: 'error', title: 'Acceso Denegado', text: 'Usuario o contraseña incorrectos', background: '#15332b', color: '#fff' });
            }
        }

        function cargarDatosDesdeAPI() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    datosGlobales = data.hoteles;
                    encabezadosGlobales = data.encabezados;
                    
                    const select = document.getElementById('selectIncode');
                    select.innerHTML = '<option value="" selected disabled>Buscar hotel...</option>'; 
                    datosGlobales.forEach(hotel => {
                        let option = document.createElement('option');
                        option.value = hotel.incode;
                        option.text = hotel.incode + " - " + hotel.nombre;
                        select.appendChild(option);
                    });

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                })
                .catch(error => {
                    Swal.fire({ icon: 'error', title: 'Error de Conexión', text: 'No se pudo conectar con Google.', background: '#15332b', color: '#fff' });
                });
        }

        // ==========================================
        // LÓGICA DE CARGA MASIVA SIN MEMORIA (SOBRESCRITURA TOTAL)
        // ==========================================
        function procesarExcel() {
            const fileInput = document.getElementById('excelFile');
            if (!fileInput.files.length) {
                Swal.fire({ icon: 'warning', title: 'Falta Archivo', text: 'Por favor selecciona un archivo Excel primero.', background: '#15332b', color: '#fff' });
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            Swal.fire({
                title: 'Leyendo Excel...',
                text: 'Mapeando coordenadas y limpiando errores...',
                background: '#15332b', color: '#fff',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                const sheetNombres = workbook.SheetNames;
                const nombreHojaOverall = sheetNombres.find(n => n.includes("Overall"));
                const nombreHojaFuentes = sheetNombres.find(n => n.includes("Fuentes"));

                if (!nombreHojaOverall || !nombreHojaFuentes) {
                    Swal.fire({ icon: 'error', title: 'Error de Formato', text: 'El Excel debe contener una pestaña con "Overall" en el nombre y otra con "Fuentes".', background: '#15332b', color: '#fff' });
                    return;
                }

                const hojaOverall = XLSX.utils.sheet_to_json(workbook.Sheets[nombreHojaOverall], {header: 1, defval: ""});
                const hojaFuentes = XLSX.utils.sheet_to_json(workbook.Sheets[nombreHojaFuentes], {header: 1, defval: ""});

                function traducirEstatus(valor) {
                    if (!valor) return "Pendiente";
                    let v = valor.toString().toLowerCase().trim();
                    if (v === "completo" || v === "entregado") return "Entregado";
                    if (v.includes("no aplica") || v === "n/a" || v.includes("ref")) return "No Aplica";
                    return "Pendiente"; // Atrapa "Sin Carga", "Incompleto", "Falta Recibo"
                }

                // 1. EXTRAER AGUA (PESTAÑA FUENTES)
                let datosAgua = {};
                let headerAguaIdx = hojaFuentes.findIndex(fila => fila[0] && fila[0].toString().toLowerCase().trim() === "clave");
                
                if (headerAguaIdx !== -1) {
                    let headersAgua = hojaFuentes[headerAguaIdx].map(h => h.toString().toLowerCase().trim());
                    let colCiud = headersAgua.findIndex(h => h.includes("agua ciud"));
                    let colPipa = headersAgua.findIndex(h => h.includes("agua de pi"));
                    let colTrat = headersAgua.findIndex(h => h.includes("agua trat"));
                    let colPozo = headersAgua.findIndex(h => h.includes("agua de po"));
                    let colParq = headersAgua.findIndex(h => h.includes("agua parque"));

                    for (let i = headerAguaIdx + 1; i < hojaFuentes.length; i++) {
                        let fila = hojaFuentes[i];
                        let incode = fila[0] ? fila[0].toString().trim() : "";
                        if (!incode || incode.toLowerCase().includes("grupo") || incode.toLowerCase().includes("servicio")) continue;
                        
                        datosAgua[incode] = {
                            aguaCiudad: colCiud !== -1 ? traducirEstatus(fila[colCiud]) : "Pendiente",
                            aguaPipa: colPipa !== -1 ? traducirEstatus(fila[colPipa]) : "Pendiente",
                            aguaTratada: colTrat !== -1 ? traducirEstatus(fila[colTrat]) : "Pendiente",
                            aguaPozo: colPozo !== -1 ? traducirEstatus(fila[colPozo]) : "Pendiente",
                            aguaParqueInd: colParq !== -1 ? traducirEstatus(fila[colParq]) : "Pendiente"
                        };
                    }
                }

                // 2. EXTRAER ENERGÉTICOS Y FUSIONAR (PESTAÑA OVERALL)
                let actualizaciones = [];
                let headerOverallIdx = hojaOverall.findIndex(fila => fila[0] && fila[0].toString().toLowerCase().trim() === "clave");
                
                if (headerOverallIdx !== -1) {
                    let headersOverall = hojaOverall[headerOverallIdx].map(h => h.toString().toLowerCase().trim());
                    
                    let colElec = headersOverall.findIndex(h => h.includes("electricidad") || h.includes("luz"));
                    let colGasNat = headersOverall.findIndex(h => h.includes("gas natural"));
                    let colGasLP = headersOverall.findIndex(h => h.includes("gas lp"));
                    let colGasol = headersOverall.findIndex(h => h.includes("gasolina"));
                    let colDiesel = headersOverall.findIndex(h => h.includes("diesel") || h.includes("diésel"));
                    
                    // Salvavidas por si cambian el nombre de los residuos
                    let colResPort = headersOverall.findIndex(h => h.includes("residuos port") || h === "residuos");
                    let colResRec = headersOverall.findIndex(h => h.includes("residuos recibos") || h === "residuos");

                    for (let i = headerOverallIdx + 1; i < hojaOverall.length; i++) {
                        let fila = hojaOverall[i];
                        let incode = fila[0] ? fila[0].toString().trim() : "";
                        
                        if (!incode || incode.toLowerCase().includes("grupo") || incode.toLowerCase().includes("servicio")) continue;

                        let agua = datosAgua[incode] || {
                            aguaCiudad: "Pendiente", aguaPipa: "Pendiente", aguaTratada: "Pendiente", aguaPozo: "Pendiente", aguaParqueInd: "Pendiente"
                        };

                        // 3. ARMADO MILIMÉTRICO (Basado en el orden de tu Google Sheets H->S)
                        let estatus12 = [
                            colResRec !== -1 ? traducirEstatus(fila[colResRec]) : "Pendiente",    // H: Residuos Drive
                            colResPort !== -1 ? traducirEstatus(fila[colResPort]) : "Pendiente",  // I: Residuos ESG
                            colGasLP !== -1 ? traducirEstatus(fila[colGasLP]) : "Pendiente",      // J: Gas LP
                            colDiesel !== -1 ? traducirEstatus(fila[colDiesel]) : "Pendiente",    // K: Diésel
                            colGasol !== -1 ? traducirEstatus(fila[colGasol]) : "Pendiente",      // L: Gasolina
                            agua.aguaCiudad,                                                      // M: Agua ciudad
                            agua.aguaPipa,                                                        // N: Agua de pipa
                            agua.aguaPozo,                                                        // O: Agua de pozo
                            agua.aguaTratada,                                                     // P: Agua tratada
                            agua.aguaParqueInd,                                                   // Q: Agua parque ind
                            colElec !== -1 ? traducirEstatus(fila[colElec]) : "Pendiente",        // R: Luz
                            colGasNat !== -1 ? traducirEstatus(fila[colGasNat]) : "Pendiente"     // S: Gas Natural
                        ];

                        actualizaciones.push({ incode: incode, estatus: estatus12 });
                    }
                }

                enviarActualizacionesMasivas(actualizaciones);
            };
            reader.readAsArrayBuffer(file);
        }

        async function enviarActualizacionesMasivas(hotelesProcesados) {
            let actualizados = 0;
            let errores = 0;

            for (let i = 0; i < hotelesProcesados.length; i++) {
                let hotel = hotelesProcesados[i];
                let existe = datosGlobales.find(h => h.incode === hotel.incode);
                if (!existe) continue;

                // YA NO HAY ESCUDO PROTECTOR. 
                // Se envía el arreglo puro y crudo desde el Excel para matar a los "Datos Zombie".
                let nuevosEstatusPuros = hotel.estatus;

                try {
                    Swal.update({ title: `Sincronizando...`, text: `Procesando hotel: ${hotel.incode} (${actualizados + 1}/${hotelesProcesados.length})` });
                    
                    let response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ incode: hotel.incode, estatus: nuevosEstatusPuros })
                    });
                    let result = await response.json();
                    if(result.status === "success") actualizados++;
                    else errores++;
                } catch (err) {
                    errores++;
                }
            }

            Swal.fire({
                icon: errores === 0 ? 'success' : 'warning',
                title: 'Proceso Terminado',
                text: `Se actualizaron y corrigieron ${actualizados} hoteles.`,
                background: '#15332b', color: '#fff'
            }).then(() => {
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('panelRubros').style.display = 'none';
                document.getElementById('loader').style.display = 'block';
                cargarDatosDesdeAPI();
                document.getElementById('excelFile').value = ""; 
            });
        }

        // ==========================================
        // LÓGICA DE EDICIÓN MANUAL
        // ==========================================
        function mostrarRubros() {
            const incode = document.getElementById('selectIncode').value;
            if(!incode) return;

            const hotel = datosGlobales.find(h => h.incode === incode);
            document.getElementById('nombreHotelLabel').innerText = "Editando Manualmente: " + hotel.nombre;
            
            const contenedor = document.getElementById('contenedorDropdowns');
            contenedor.innerHTML = "";

            encabezadosGlobales.forEach((encabezado, i) => {
                let estatus = hotel.estatus[i] || 'Pendiente';
                
                let claseColor = 'status-pendiente';
                if(estatus === 'Entregado') claseColor = 'status-entregado';
                else if(estatus === 'No Aplica') claseColor = 'status-no-aplica';

                let tituloLimpio = encabezado.replace('Estatus ', '').replace(' (ESG)', '').replace(' (ASG)', '').replace(' (Drive)', '');

                contenedor.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <label class="form-label small text-uppercase" style="color:#a8b8c8;">${tituloLimpio}</label>
                        <select class="form-select status-select ${claseColor}" id="rubro_${i}" onchange="cambiarColor(this)">
                            <option value="Pendiente" ${estatus === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option value="Entregado" ${estatus === 'Entregado' ? 'selected' : ''}>Entregado</option>
                            <option value="No Aplica" ${estatus === 'No Aplica' ? 'selected' : ''}>No Aplica</option>
                        </select>
                    </div>
                `;
            });

            document.getElementById('panelRubros').style.display = 'block';
        }

        function cambiarColor(selectElement) {
            if(selectElement.value === 'Pendiente') selectElement.className = "form-select status-select status-pendiente";
            else if(selectElement.value === 'Entregado') selectElement.className = "form-select status-select status-entregado";
            else if(selectElement.value === 'No Aplica') selectElement.className = "form-select status-select status-no-aplica";
        }

        function guardarEnGoogle() {
            const incode = document.getElementById('selectIncode').value;
            let nuevosEstatus = [];
            
            for(let i=0; i<12; i++) {
                nuevosEstatus.push(document.getElementById('rubro_' + i).value);
            }

            Swal.fire({
                title: 'Sincronizando...',
                text: 'Guardando datos en la matriz principal de Google Sheets...',
                background: '#15332b', color: '#fff',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ incode: incode, estatus: nuevosEstatus })
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    Swal.fire({ icon: 'success', title: '¡Guardado!', text: 'El estatus de ' + incode + ' fue actualizado con éxito.', background: '#15332b', color: '#fff' })
                    .then(() => {
                        document.getElementById('dashboard').style.display = 'none';
                        document.getElementById('panelRubros').style.display = 'none';
                        document.getElementById('loader').style.display = 'block';
                        cargarDatosDesdeAPI();
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: result.message, background: '#15332b', color: '#fff' });
                }
            })
            .catch(error => {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Falló la conexión al guardar.', background: '#15332b', color: '#fff' });
            });
        }
    </script>
</body>
</html>
